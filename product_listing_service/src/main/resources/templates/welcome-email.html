<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Welcome to CodeTrace!</title>
</head>
<body>
    <h2>Welcome, <span th:text="${firstName}"></span>!</h2>
    <p>Dear <span th:text="${firstName}"></span> <span th:text="${lastName}"></span>,</p>
    <p>Thank you for registering with CodeTrace. Your username is <b th:text="${username}"></b>.</p>
    <p>If you have any questions, feel free to contact us at any time.</p>
    <hr>
    <p>Email: <span th:text="${email}"></span></p>
    <p>Mobile: <span th:text="${mobileNumber}"></span></p>
    <p>Best regards,<br/>The CodeTrace Team</p>
</body>
</html>
